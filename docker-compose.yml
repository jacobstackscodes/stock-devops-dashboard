services:

  nginx:
    image: nginx:latest
    container_name: stock-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: stock-backend
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: admin
      DB_NAME: stock_project
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    container_name: stock-mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: stock_project
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: stock-worker
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: admin
      DB_NAME: stock_project
    depends_on:
      - mysql

  jenkins:
    image: jenkins/jenkins:lts
    container_name: stock-jenkins
    ports:
      - "8081:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  mysql_data:
  jenkins_home: